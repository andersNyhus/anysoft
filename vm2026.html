<!DOCTYPE html>
<html lang="no">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>VM 2026 – Kampprogram</title>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    :root {
      --bg:           #04101E;
      --surface:      #0C1C35;
      --surface-hi:   #132540;
      --border:       rgba(255, 255, 255, 0.07);
      --gold:         #C9A84C;
      --gold-dim:     rgba(201, 168, 76, 0.15);
      --text:         #E0DBD1;
      --text-muted:   #6B82A0;
      --font-serif:   Georgia, 'Times New Roman', serif;
      --font-sans:    system-ui, -apple-system, 'Helvetica Neue', Arial, sans-serif;
    }

    html { scroll-behavior: smooth; }

    body {
      background-color: #0b3d1d;
      background-image:
        repeating-linear-gradient(180deg, rgba(255,255,255,0.06), rgba(255,255,255,0.06) 1px, transparent 1px, transparent 42px),
        linear-gradient(135deg, rgba(255,255,255,0.04), transparent 30%, rgba(255,255,255,0.04) 70%, transparent 100%);
      background-blend-mode: overlay, normal;
      color: var(--text);
      font-family: var(--font-sans);
      line-height: 1.5;
      min-height: 100vh;
    }

    /* ── Header ── */
    .site-header { position: relative; padding: 64px 48px 56px; text-align: center; overflow: hidden; border-bottom: 1px solid var(--border); }
    .header-bg-year { position: absolute; inset: 0; display: flex; align-items: center; justify-content: center; font-family: var(--font-serif); font-size: clamp(160px,26vw,320px); font-weight: normal; color: rgba(255,255,255,0.025); letter-spacing: -0.04em; pointer-events: none; user-select: none; line-height: 1; }
    .header-content { position: relative; }
    .header-eyebrow { font-size: 11px; letter-spacing: 0.28em; text-transform: uppercase; color: var(--gold); font-weight: 600; margin-bottom: 20px; }
    .header-title { font-family: var(--font-serif); font-size: clamp(60px,11vw,128px); font-weight: normal; letter-spacing: -0.02em; line-height: 0.88; color: var(--text); }
    .header-title em { font-style: normal; color: var(--gold); }
    .header-rule { display: flex; align-items: center; justify-content: center; gap: 16px; margin: 28px auto 20px; }
    .header-rule-line { width: 48px; height: 1px; background: var(--gold); opacity: 0.5; }
    .header-rule-dot  { width: 5px; height: 5px; border-radius: 50%; background: var(--gold); }
    .header-subtitle { font-size: 12px; letter-spacing: 0.2em; text-transform: uppercase; color: var(--text-muted); }

    /* ── Nav ── */
    .round-nav {
      position: sticky; top: 0; z-index: 100;
      background: rgba(4,16,30,0.94);
      backdrop-filter: blur(16px); -webkit-backdrop-filter: blur(16px);
      border-bottom: 1px solid var(--border);
      display: flex; align-items: stretch;
      padding: 0 48px;
    }
    #round-nav-links { display: flex; overflow-x: auto; scrollbar-width: none; flex: 1; }
    #round-nav-links::-webkit-scrollbar { display: none; }
    .nav-link { display: flex; flex-direction: column; align-items: center; gap: 3px; padding: 13px 18px; text-decoration: none; border-bottom: 2px solid transparent; transition: background 0.15s, border-color 0.2s; white-space: nowrap; flex-shrink: 0; }
    .nav-link:hover { background: rgba(255,255,255,0.04); }
    .nav-link.active { border-bottom-color: var(--gold); }
    .nav-link.active .nav-badge { opacity: 1; }
    .nav-badge { font-size: 10px; font-weight: 700; letter-spacing: 0.1em; opacity: 0.7; transition: opacity 0.2s; }
    .nav-label { font-size: 11px; color: var(--text-muted); }

    /* ── View switcher ── */
    .view-switcher { display: flex; align-items: center; gap: 4px; padding: 10px 0 10px 16px; border-left: 1px solid var(--border); flex-shrink: 0; margin-left: 8px; }
    .view-btn { display: flex; align-items: center; gap: 5px; padding: 5px 11px; border: 1px solid var(--border); background: transparent; color: var(--text-muted); font-size: 10px; font-family: var(--font-sans); letter-spacing: 0.12em; text-transform: uppercase; font-weight: 600; cursor: pointer; border-radius: 2px; transition: all 0.15s; white-space: nowrap; }
    .view-btn:hover { background: rgba(255,255,255,0.04); color: var(--text); }
    .view-btn.active { background: var(--gold-dim); color: var(--gold); border-color: rgba(201,168,76,0.3); }

    /* ── Main ── */
    .main { max-width: 1440px; margin: 0 auto; padding: 0 48px 100px; }

    /* ── Ladder ── */
    .tournament-ladder { display: flex; align-items: center; padding: 36px 0 0; overflow-x: auto; scrollbar-width: none; }
    .tournament-ladder::-webkit-scrollbar { display: none; }
    .ladder-step { display: flex; align-items: center; flex-shrink: 0; }
    .ladder-node { display: flex; flex-direction: column; align-items: center; gap: 6px; cursor: pointer; text-decoration: none; padding: 8px 12px; border-radius: 3px; transition: background 0.15s; }
    .ladder-node:hover { background: rgba(255,255,255,0.04); }
    .ladder-count { font-family: var(--font-serif); font-size: 22px; font-weight: normal; line-height: 1; }
    .ladder-label { font-size: 10px; letter-spacing: 0.1em; text-transform: uppercase; color: var(--text-muted); text-align: center; }
    .ladder-arrow { display: flex; align-items: center; padding: 0 8px; padding-bottom: 22px; }
    .ladder-arrow svg { color: var(--border); }

    /* ── Round sections ── */
    .round-section { padding-top: 80px; }
    .round-header { display: flex; align-items: flex-end; justify-content: space-between; gap: 16px; margin-bottom: 36px; padding-bottom: 20px; border-bottom: 1px solid var(--border); }
    .round-header-left { flex: 1; min-width: 0; }
    .round-eyebrow { font-size: 10px; letter-spacing: 0.22em; text-transform: uppercase; font-weight: 700; margin-bottom: 8px; }
    .round-title { font-family: var(--font-serif); font-size: clamp(28px,5vw,54px); font-weight: normal; letter-spacing: -0.015em; line-height: 1; color: var(--text); text-wrap: balance; }
    .round-meta { font-size: 12px; color: var(--text-muted); text-align: right; white-space: nowrap; }
    .round-meta-count { font-size: 32px; font-family: var(--font-serif); display: block; color: var(--text); line-height: 1; font-variant-numeric: tabular-nums; }
    .match-grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(290px,1fr)); gap: 12px; }

    /* ── Match card ── */
    .match-card { background: var(--surface); border: 1px solid var(--border); border-radius: 3px; overflow: hidden; transition: background 0.15s, border-color 0.2s, transform 0.15s; display: flex; flex-direction: column; }
    .match-card:hover { background: var(--surface-hi); border-color: rgba(201,168,76,0.22); transform: translateY(-2px); }
    .card-header { display: flex; justify-content: space-between; align-items: center; padding: 10px 14px; border-bottom: 1px solid var(--border); }
    .card-match-num { font-size: 10px; font-weight: 700; letter-spacing: 0.14em; text-transform: uppercase; }
    .card-date { font-size: 11px; color: var(--text-muted); letter-spacing: 0.04em; font-variant-numeric: tabular-nums; }
    .card-body { padding: 18px 14px 16px; flex: 1; }
    .team-name { font-size: 14px; font-weight: 600; color: var(--text); line-height: 1.3; }
    .vs-row { display: flex; align-items: center; gap: 10px; margin: 10px 0; }
    .vs-rule { flex: 1; height: 1px; background: var(--border); }
    .vs-text { font-size: 9px; font-weight: 700; letter-spacing: 0.2em; color: var(--text-muted); }
    .card-footer { display: flex; justify-content: space-between; align-items: flex-end; padding: 10px 14px; border-top: 1px solid var(--border); gap: 8px; }
    .venue { min-width: 0; }
    .venue-name { font-size: 11px; color: var(--text-muted); white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
    .venue-city { font-size: 10px; color: var(--text-muted); opacity: 0.6; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
    .times { text-align: right; flex-shrink: 0; }
    .time-local { font-size: 14px; font-weight: 600; color: var(--text); font-variant-numeric: tabular-nums; line-height: 1.2; }
    .time-cest { font-size: 10px; color: var(--text-muted); font-variant-numeric: tabular-nums; }
    .section-finale .match-card { background: linear-gradient(145deg,#0F2240,#0C1C35); border-color: rgba(201,168,76,0.25); }
    .section-finale .match-card:hover { border-color: rgba(201,168,76,0.5); background: linear-gradient(145deg,#142D52,#102540); }
    .section-finale .team-name { font-size: 16px; }

    /* ── Bracket view ── */
    .bracket-outer { padding: 32px 0 100px; display: none; }

    .bracket-mode-bar {
      display: flex; align-items: center; gap: 6px;
      margin-bottom: 20px; padding-bottom: 16px;
      border-bottom: 1px solid var(--border);
    }
    .bracket-mode-label { font-size: 10px; letter-spacing: 0.14em; text-transform: uppercase; color: var(--text-muted); margin-right: 4px; }
    .mode-btn { padding: 5px 12px; border: 1px solid var(--border); background: transparent; color: var(--text-muted); font-size: 10px; font-family: var(--font-sans); letter-spacing: 0.1em; text-transform: uppercase; font-weight: 600; cursor: pointer; border-radius: 2px; transition: all 0.15s; }
    .mode-btn:hover { background: rgba(255,255,255,0.04); color: var(--text); }
    .mode-btn.active { background: var(--gold-dim); color: var(--gold); border-color: rgba(201,168,76,0.3); }

    .bracket-scroll { overflow-x: auto; overflow-y: visible; scrollbar-width: thin; scrollbar-color: rgba(255,255,255,0.1) transparent; padding-bottom: 16px; }
    .bracket-canvas { position: relative; }
    .bracket-canvas svg { position: absolute; top: 0; left: 0; pointer-events: none; overflow: visible; }

    .bcol-label { position: absolute; top: 0; font-size: 9px; font-weight: 700; letter-spacing: 0.18em; text-transform: uppercase; text-align: center; }

    .bmatch { position: absolute; background: #FFFFFF; border: 1px solid rgba(58, 142, 84, 0.24); border-radius: 8px; overflow: hidden; transition: border-color 0.15s, background 0.15s, transform 0.15s; box-shadow: 0 14px 28px rgba(10, 28, 15, 0.14); }
    .bmatch:hover { background: #F7FFF8; border-color: rgba(58, 142, 84, 0.45); transform: translateY(-1px); }
    .bmatch-head { display: flex; justify-content: space-between; align-items: center; padding: 8px 10px; border-bottom: 1px solid rgba(58, 142, 84, 0.16); }
    .bmatch-date { font-size: 10px; font-weight: 700; color: #236B38; font-variant-numeric: tabular-nums; text-transform: uppercase; letter-spacing: 0.08em; }
    .bmatch-time { font-size: 10px; color: #4D745E; font-variant-numeric: tabular-nums; text-transform: uppercase; letter-spacing: 0.08em; }
    .bmatch-body { padding: 10px 10px 10px; display: flex; flex-direction: column; gap: 6px; }
    .bmatch-team { font-size: 12px; color: #06120d; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; line-height: 1.35; font-weight: 700; }
    .bmatch-team.away { color: #386c4f; }
    .bmatch-foot { display: block; margin-top: 6px; font-size: 10px; color: #3B6F43; letter-spacing: 0.08em; text-transform: uppercase; }
    .bmatch-vs { display: none; }

    /* Oppsett toggle via CSS class */
    .bracket-canvas.show-oppsett .lagname { display: none; }
    .bracket-canvas.show-oppsett .oppsett { display: inline; }
    .bracket-canvas:not(.show-oppsett) .lagname { display: inline; }
    .bracket-canvas:not(.show-oppsett) .oppsett { display: none; }

    /* ── State / loading ── */
    .state-panel { padding: 80px 48px; text-align: center; }
    .state-title { font-family: var(--font-serif); font-size: 32px; font-weight: normal; color: var(--text); margin-bottom: 16px; }
    .state-body { font-size: 15px; color: var(--text-muted); line-height: 1.75; max-width: 520px; margin: 0 auto; }
    .state-code { display: inline-block; margin-top: 28px; background: var(--surface); border: 1px solid var(--border); padding: 14px 24px; border-radius: 3px; font-family: 'Courier New',Courier,monospace; font-size: 13px; color: var(--gold); letter-spacing: 0.04em; }
    .state-note { margin-top: 16px; font-size: 13px; color: var(--text-muted); }
    .loading-dots { display: inline-flex; gap: 6px; margin-top: 4px; }
    .loading-dots span { width: 5px; height: 5px; border-radius: 50%; background: var(--text-muted); animation: dot-pulse 1.4s ease-in-out infinite; }
    .loading-dots span:nth-child(2) { animation-delay: 0.2s; }
    .loading-dots span:nth-child(3) { animation-delay: 0.4s; }
    @keyframes dot-pulse { 0%,80%,100% { opacity: 0.25; transform: scale(0.8); } 40% { opacity: 1; transform: scale(1); } }

    /* ── Responsive ── */
    @media (max-width: 900px) { .site-header { padding: 48px 24px 44px; } .round-nav { padding: 0 24px; } .main { padding: 0 24px 80px; } }
    @media (max-width: 600px) { .site-header { padding: 40px 16px 36px; } .round-nav { padding: 0 16px; } .main { padding: 0 16px 60px; } .nav-link { padding: 12px; } .match-grid { grid-template-columns: 1fr; } .round-header { flex-direction: column; align-items: flex-start; gap: 8px; } .round-meta { text-align: left; } .view-switcher { padding-left: 8px; } }
    @media (prefers-reduced-motion: reduce) { .match-card, .bmatch { transition: none; } .loading-dots span { animation: none; opacity: 1; } }
  </style>
</head>
<body>

<header class="site-header">
  <div class="header-bg-year" aria-hidden="true">2026</div>
  <div class="header-content">
    <p class="header-eyebrow">FIFA Verdensmesterskap &nbsp;·&nbsp; USA · Canada · Mexico</p>
    <h1 class="header-title">VM <em>2026</em></h1>
    <div class="header-rule" aria-hidden="true">
      <div class="header-rule-line"></div><div class="header-rule-dot"></div><div class="header-rule-line"></div>
    </div>
    <p class="header-subtitle">Kampprogram · Sluttspill</p>
  </div>
</header>

<nav class="round-nav" aria-label="Navigasjon">
  <div id="round-nav-links"></div>
  <div class="view-switcher">
    <button class="view-btn active" id="btn-card" aria-pressed="true" title="Kortvisning">
      <svg width="13" height="13" viewBox="0 0 13 13" fill="none" aria-hidden="true">
        <rect x="0.5" y="0.5" width="5" height="5" rx="0.5" stroke="currentColor" stroke-width="1.2"/>
        <rect x="7.5" y="0.5" width="5" height="5" rx="0.5" stroke="currentColor" stroke-width="1.2"/>
        <rect x="0.5" y="7.5" width="5" height="5" rx="0.5" stroke="currentColor" stroke-width="1.2"/>
        <rect x="7.5" y="7.5" width="5" height="5" rx="0.5" stroke="currentColor" stroke-width="1.2"/>
      </svg>
      Kort
    </button>
    <button class="view-btn" id="btn-tree" aria-pressed="false" title="Bracket">
      <svg width="13" height="13" viewBox="0 0 13 13" fill="none" aria-hidden="true">
        <rect x="1" y="1" width="4" height="3" rx="0.5" stroke="currentColor" stroke-width="1.1"/>
        <rect x="1" y="9" width="4" height="3" rx="0.5" stroke="currentColor" stroke-width="1.1"/>
        <rect x="8" y="5" width="4" height="3" rx="0.5" stroke="currentColor" stroke-width="1.1"/>
        <path d="M5 2.5h1.5v8H5" stroke="currentColor" stroke-width="1.1" stroke-linecap="round" stroke-linejoin="round"/>
        <path d="M6.5 6.5H8" stroke="currentColor" stroke-width="1.1" stroke-linecap="round"/>
      </svg>
      Tre
    </button>
  </div>
</nav>

<main class="main" id="main">
  <div class="state-panel">
    <p class="state-title">Laster kampprogram</p>
    <div class="loading-dots" aria-label="Laster…"><span></span><span></span><span></span></div>
  </div>
</main>

<script>
  const ROUNDS = {
    'Sekstendelsfinale': { short: 'R32', color: '#5B8DB8', order: 1 },
    'Åttedelsfinale':    { short: 'R16', color: '#4A9E85', order: 2 },
    'Kvartfinale':       { short: 'QF',  color: '#C9A84C', order: 3 },
    'Semifinale':        { short: 'SF',  color: '#D97B3A', order: 4 },
    'Bronsefinale':      { short: '3P',  color: '#9E7B5A', order: 5 },
    'Finale':            { short: 'F',   color: '#C9A84C', order: 6 },
  };

  const MONTHS = { 'januar':'jan','februar':'feb','mars':'mar','april':'apr','mai':'mai','juni':'jun','juli':'jul','august':'aug','september':'sep','oktober':'okt','november':'nov','desember':'des' };

  function parseCSV(raw) {
    const [headerLine, ...rows] = raw.trim().split('\n');
    const headers = headerLine.split(',').map(h => h.trim());
    return rows.filter(r => r.trim()).map(row => {
      const cols = row.split(',').map(c => c.trim());
      return Object.fromEntries(headers.map((h, i) => [h, cols[i] ?? '']));
    });
  }

  function groupByRound(matches) {
    const map = {};
    matches.forEach(m => { (map[m.Runde] = map[m.Runde] || []).push(m); });
    return map;
  }

  function sortedRounds(groups) {
    return Object.keys(groups).sort((a, b) => (ROUNDS[a]?.order ?? 99) - (ROUNDS[b]?.order ?? 99));
  }

  // Handles both "28.jun.26" and "28. juni 2026"
  function fmtDate(d) {
    if (!d) return '';
    if (/^\d+\.[a-z]+\.\d+$/i.test(d)) {
      const [day, mon, yr] = d.split('.');
      return `${parseInt(day)} ${mon} 20${yr}`;
    }
    const [day, , month, , year] = d.split(' ');
    return `${day} ${MONTHS[month] || month} ${year}`;
  }

  function fmtDateShort(d) {
    if (!d) return '';
    if (/^\d+\.[a-z]+\.\d+$/i.test(d)) {
      const [day, mon] = d.split('.');
      return `${parseInt(day)}.${mon}`;
    }
    const [day, , month] = d.split(' ');
    return `${day} ${MONTHS[month] || month}`;
  }

  function hexToRgb(hex) {
    const r = parseInt(hex.slice(1,3),16), g = parseInt(hex.slice(3,5),16), b = parseInt(hex.slice(5,7),16);
    return `${r},${g},${b}`;
  }

  function encodeRound(r) {
    return 'round-' + r.replace(/å/g,'a').replace(/æ/g,'ae').replace(/ø/g,'o').replace(/\s+/g,'-').toLowerCase();
  }

  function buildNav(rounds) {
    return rounds.map(r => {
      const cfg = ROUNDS[r] || { short:'?', color:'#666' };
      return `<a class="nav-link" href="#${encodeRound(r)}" data-round="${r}" aria-label="${r}">
        <span class="nav-badge" style="color:${cfg.color}">${cfg.short}</span>
        <span class="nav-label">${r}</span></a>`;
    }).join('');
  }

  function buildLadder(rounds, groups) {
    return '<div class="tournament-ladder">' +
      rounds.map((r, i) => {
        const cfg = ROUNDS[r] || { short:'?', color:'#666' };
        const arrow = i < rounds.length-1
          ? `<div class="ladder-arrow"><svg width="16" height="16" viewBox="0 0 16 16" fill="none"><path d="M6 4l4 4-4 4" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"/></svg></div>`
          : '';
        return `<div class="ladder-step"><a class="ladder-node" href="#${encodeRound(r)}">
          <span class="ladder-count" style="color:${cfg.color}">${groups[r].length}</span>
          <span class="ladder-label">${cfg.short}</span></a>${arrow}</div>`;
      }).join('') + '</div>';
  }

  function buildCard(m) {
    const cfg = ROUNDS[m.Runde] || { color:'#888' };
    return `<article class="match-card">
      <div class="card-header">
        <span class="card-match-num" style="color:${cfg.color}">Kamp ${m.Kamp_nr}</span>
        <span class="card-date">${fmtDate(m.Dato)}</span>
      </div>
      <div class="card-body">
        <div class="team-name">${m.Hjemmelag}</div>
        <div class="vs-row"><div class="vs-rule"></div><span class="vs-text">vs</span><div class="vs-rule"></div></div>
        <div class="team-name">${m.Bortelag}</div>
      </div>
      <div class="card-footer">
        <div class="venue">
          <div class="venue-name">${m.Stadion}</div>
          <div class="venue-city">${m.By}</div>
        </div>
        <div class="times">
          <div class="time-local">${m.Tid_CEST}</div>
          <div class="time-cest">${m.Tid_lokal} lokal</div>
        </div>
      </div></article>`;
  }

  function buildSection(round, matches) {
    const cfg = ROUNDS[round] || { color:'#888', short:'?' };
    const cls = round === 'Finale' ? ' section-finale' : '';
    return `<section class="round-section${cls}" id="${encodeRound(round)}">
      <div class="round-header">
        <div class="round-header-left">
          <div class="round-eyebrow" style="color:${cfg.color}">${cfg.short} &nbsp;·&nbsp; ${round}</div>
          <h2 class="round-title">${round}</h2>
        </div>
        <div class="round-meta">
          <span class="round-meta-count">${matches.length}</span>
          ${matches.length === 1 ? 'kamp' : 'kamper'}
        </div>
      </div>
      <div class="match-grid">${matches.map(buildCard).join('')}</div>
    </section>`;
  }

  /* ── Bracket view ── */
  function buildBracket(allMatches) {
    const BOX_W = 220, BOX_H = 88, ROW_H = 95;
    const X0 = 10, Y0 = 46;

    const R32 = [74,77, 73,75, 83,84, 81,82, 76,78, 79,80, 86,88, 85,87];

    const mmap = {};
    allMatches.forEach(m => { mmap[+m.Kamp_nr] = m; });

    const cy = {};
    R32.forEach((n, i) => { cy[n] = Y0 + i * ROW_H + BOX_H / 2; });

    function xOf() { return X0; }
    function yOf(n) { return cy[n] - BOX_H / 2; }

    const ALL = [...R32];
    const canvasW = X0 + BOX_W + X0;
    const canvasH = Math.max(...ALL.map(n => yOf(n) + BOX_H)) + 40;

    function renderMatch(n) {
      const m = mmap[n];
      if (!m) return '';
      const bord = 'rgba(58, 142, 84, 0.3)';
      return `<div class="bmatch" style="left:${xOf()}px;top:${yOf(n)}px;width:${BOX_W}px;height:${BOX_H}px;border-color:${bord};">
        <div class="bmatch-head">
          <span class="bmatch-date">${fmtDateShort(m.Dato)}</span>
          <span class="bmatch-time">${m.Tid_CEST} CEST</span>
        </div>
        <div class="bmatch-body">
          <div class="bmatch-team">${m.Hjemme_oppsett || m.Hjemmelag}</div>
          <div class="bmatch-team away">${m.Borte_Oppsett || m.Bortelag}</div>
          <span class="bmatch-foot">${m.By}</span>
        </div>
      </div>`;
    }

    const colLabel = `<div class="bcol-label" style="left:${X0}px;width:${BOX_W}px;color:#9EE2B7;">Sekstendelsfinale</div>`;
    const matchBoxes = ALL.map(renderMatch).join('');

    return `<div class="bracket-outer" id="bracket-outer">
      <div class="bracket-mode-bar">
        <span class="bracket-mode-label">Lagvisning:</span>
        <button class="mode-btn active" id="btn-lagopp">Hjemme / Borte</button>
        <button class="mode-btn" id="btn-oppsett">Tabellposisjon</button>
      </div>
      <div class="bracket-scroll">
        <div class="bracket-canvas" id="bracket-canvas" style="width:${canvasW}px;height:${canvasH}px;">
          ${colLabel}
          ${matchBoxes}
        </div>
      </div>
    </div>`;
  }

  function initViewToggle(cardViewEl, bracketEl, navLinksEl) {
    const btnCard = document.getElementById('btn-card');
    const btnTree = document.getElementById('btn-tree');

    btnCard.addEventListener('click', () => {
      btnCard.classList.add('active'); btnCard.setAttribute('aria-pressed','true');
      btnTree.classList.remove('active'); btnTree.setAttribute('aria-pressed','false');
      cardViewEl.style.display = '';
      bracketEl.style.display = 'none';
      navLinksEl.style.display = '';
    });

    btnTree.addEventListener('click', () => {
      btnTree.classList.add('active'); btnTree.setAttribute('aria-pressed','true');
      btnCard.classList.remove('active'); btnCard.setAttribute('aria-pressed','false');
      cardViewEl.style.display = 'none';
      bracketEl.style.display = 'block';
      navLinksEl.style.display = 'none';
    });

    // Bracket oppsett toggle (delegated — buttons rendered later)
    document.addEventListener('click', e => {
      if (e.target.id === 'btn-lagopp') {
        document.getElementById('btn-lagopp')?.classList.add('active');
        document.getElementById('btn-oppsett')?.classList.remove('active');
        document.getElementById('bracket-canvas')?.classList.remove('show-oppsett');
      } else if (e.target.id === 'btn-oppsett') {
        document.getElementById('btn-oppsett')?.classList.add('active');
        document.getElementById('btn-lagopp')?.classList.remove('active');
        document.getElementById('bracket-canvas')?.classList.add('show-oppsett');
      }
    });
  }

  function showError() {
    document.getElementById('main').innerHTML = `<div class="state-panel">
      <h2 class="state-title">Kan ikke laste kampprogram</h2>
      <p class="state-body">Åpne filene via en lokal webserver.</p>
      <div class="state-code">python3 -m http.server 8080</div>
      <p class="state-note">Åpne <strong>http://localhost:8080/vm2026.html</strong></p>
    </div>`;
  }

  async function init() {
    try {
      const res = await fetch('vm2026_kampprogram.csv');
      if (!res.ok) throw new Error(`HTTP ${res.status}`);
      const matches = parseCSV(await res.text());
      const groups  = groupByRound(matches);
      const rounds  = sortedRounds(groups);

      const navLinksEl = document.getElementById('round-nav-links');
      navLinksEl.innerHTML = buildNav(rounds);

      const cardWrapper = document.createElement('div');
      cardWrapper.id = 'card-view';
      cardWrapper.innerHTML = buildLadder(rounds, groups) + rounds.map(r => buildSection(r, groups[r])).join('');

      const bracketWrapper = document.createElement('div');
      bracketWrapper.innerHTML = buildBracket(matches);
      const bracketEl = bracketWrapper.firstElementChild;
      bracketEl.style.display = 'none';

      const main = document.getElementById('main');
      main.innerHTML = '';
      main.appendChild(cardWrapper);
      main.appendChild(bracketEl);

      initViewToggle(cardWrapper, bracketEl, navLinksEl);

      // Active nav on scroll
      const sections = document.querySelectorAll('.round-section');
      const links    = document.querySelectorAll('.nav-link');
      const observer = new IntersectionObserver(entries => {
        entries.forEach(entry => {
          if (entry.isIntersecting) {
            const id = entry.target.id;
            links.forEach(l => l.classList.toggle('active', l.getAttribute('href') === '#'+id));
          }
        });
      }, { threshold: 0.25, rootMargin: '-60px 0px -60% 0px' });
      sections.forEach(s => observer.observe(s));
      if (links.length) links[0].classList.add('active');

    } catch (err) { showError(); }
  }

  init();
</script>
</body>
</html>
